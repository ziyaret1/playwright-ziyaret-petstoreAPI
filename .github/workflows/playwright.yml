name: Playwright Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      # ✅ .env faylını yaradıb yoxlayırıq
      - name: Create .env file
        run: |
          echo "BASE_API=${{ secrets.BASE_API }}" > .env
          echo "✅ .env file created with BASE_API:"
          cat .env

      - name: Verify BASE_API environment variable
        run: echo "✅ BASE_API from ENV: $BASE_API"
        env:
          BASE_API: ${{ secrets.BASE_API }}

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Run Playwright Tests with Allure + HTML reporters
        env:
          BASE_API: ${{ secrets.BASE_API }}
        run: |
          echo "🚀 Running Playwright tests with BASE_API=$BASE_API"
          npx playwright test --reporter=html,allure-playwright --workers=1
        continue-on-error: true

      - name: Install Allure CLI
        run: npm install -g allure-commandline --save-dev

      - name: Generate Allure Report
        if: always()
        run: allure generate ./allure-results --clean -o ./allure-report

      - name: Upload Playwright HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Allure Report Artifact
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: ./site/allure-report

      - name: Download Playwright HTML Report Artifact
        uses: actions/download-artifact@v4
        with:
          name: playwright-html-report
          path: ./site/playwright-report

      - name: Create Reports index page
        run: |
          echo '<!DOCTYPE html>' > ./site/index.html
          echo '<html><head><meta charset="UTF-8"><title>Test Reports</title>' >> ./site/index.html
          echo '<style>' >> ./site/index.html
          echo 'body { font-family: "Segoe UI", sans-serif; background: linear-gradient(135deg,#141e30,#243b55); color: #fff; text-align: center; padding: 50px; }' >> ./site/index.html
          echo 'h1 { font-size: 2.2rem; margin-bottom: 40px; }' >> ./site/index.html
          echo 'ul { list-style: none; display: flex; justify-content: center; gap: 40px; padding: 0; }' >> ./site/index.html
          echo 'a { display: inline-block; padding: 18px 36px; border-radius: 12px; background: #1e3c72; color: #fff; text-decoration: none; font-size: 18px; transition: all 0.3s ease; box-shadow: 0 8px 20px rgba(0,0,0,0.4); }' >> ./site/index.html
          echo 'a:hover { background: #2a5298; transform: translateY(-4px); }' >> ./site/index.html
          echo '</style></head><body>' >> ./site/index.html
          echo '<h1>📊 Test Reports</h1><ul>' >> ./site/index.html
          echo '<li><a href="allure-report/index.html">🚀 Allure Report</a></li>' >> ./site/index.html
          echo '<li><a href="playwright-report/index.html">🎭 Playwright HTML Report</a></li>' >> ./site/index.html
          echo '</ul></body></html>' >> ./site/index.html

      - name: Deploy Reports to GitHub Pages 🚀
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site

